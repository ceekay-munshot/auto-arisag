name: Refresh dashboard data

on:
  schedule:
    # Three times a day at 8:30 AM, 2:30 PM and 8:30 PM IST.
    # IST = UTC + 05:30, so subtract 05:30: 03:00, 09:00, 15:00 UTC.
    # Note: the heavy "Backfill OEM history" step only runs on the 09:00 UTC
    # tick (2:30 PM IST) — it lines up with FADA's typical publication time,
    # and skipping it on the other two ticks shaves 5–8 minutes off those
    # runs. Lighter scrapers (RBI / macro / stocks) still fire on every tick.
    - cron: '0 3,9,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf openpyxl requests

      - name: Install Playwright + Chromium (Vahan scraper)
        # Only needed by scripts/refresh_vahan_playwright.py, which runs on
        # the heavy 09:00 UTC tick. The browser install adds ~80 MB and ~60s
        # the first time; subsequent runs reuse the GitHub-hosted runner's
        # cache where possible.
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Refresh dashboard data
        run: python -u build_dashboard.py --refresh-live

      - name: Refresh Vahan registrations (Playwright)
        # Headless-Chromium drive of vahan.parivahan.gov.in/vahan4dashboard/
        # to fetch all-India maker-wise monthly registrations for every
        # tracked segment. Writes per-month CSVs under data/vahan/ which the
        # analyzer's collect_vahan_imports() picks up to un-hide the
        # registration tab. Forward-retention: each tick fetches the latest
        # 2 months and accumulates history. Heavy step — gated to 09:00 UTC.
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: python -u scripts/refresh_vahan_playwright.py
        continue-on-error: true

      - name: Backfill OEM history (all categories)
        # Idempotent — only fetches PDFs for months that don't yet have rows
        # for every tracked category in data/oem_history.json. After the first
        # successful run this is essentially a no-op until a new monthly URL
        # appears in data/source_snapshot.json.
        # Restricted to the 09:00 UTC (2:30 PM IST) tick to save 5–8 min on
        # the other two daily runs. workflow_dispatch (manual) always runs it.
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: python -u scripts/backfill_oem_history.py
        continue-on-error: true

      # SIAM history: deepening now happens forward via update_siam itself
      # (it appends each ingested month to data/siam_history.json). The
      # listing-page scraper at scripts/extend_siam_history.py is preserved
      # but disabled — SIAM's listing page is JS-rendered, so static HTML
      # parsing finds 0 detail URLs. Re-enable here if the listing ever
      # becomes server-side-rendered again.
      # - name: Extend SIAM wholesale history
      #   if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
      #   run: python -u scripts/extend_siam_history.py
      #   continue-on-error: true

      - name: Backfill listed-OEM company history
        # Idempotent — discovers monthly company press releases via Wayback
        # and fills data/company_unit_history.json. Snapshot/static rows in
        # dashboard/config.py always win for the same month.
        # As of 2026-05 only TVS Motor / M&M / Atul Auto adapters produce
        # data; the other 5 are commented out in COMPANY_FETCHERS.
        # Restricted to the 09:00 UTC tick to keep the lighter ticks fast.
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
        run: python -u scripts/backfill_company_history.py
        continue-on-error: true

      - name: Refresh RBI vehicle-loan credit pulse
        # Walks RBI's Sectoral Deployment of Bank Credit press releases for
        # any month newer than what data/rbi_credit.json already carries,
        # parses the Vehicle Loans line, and refreshes the file. Idempotent.
        run: python -u scripts/refresh_rbi_credit.py
        continue-on-error: true

      - name: Refresh macro indicators (USD/INR + fuel)
        # Live USD/INR from Yahoo Finance, fuel prices from Goodreturns.
        # Repo rate is preserved (manual update on RBI MPC announcements).
        run: python -u scripts/refresh_macro.py
        continue-on-error: true

      - name: Refresh listed-OEM stock prices
        # Yahoo Finance daily closes for every NSE-listed OEM in
        # data/oem_stocks.json; computes 1D/1W/1M deltas.
        run: python -u scripts/refresh_stocks.py
        continue-on-error: true

      - name: Refresh OEM earnings calendar (NSE corporate filings)
        # Walks NSE's event-calendar API for upcoming OEM result dates.
        # Falls back to seeded events when NSE blocks the runner.
        run: python -u scripts/refresh_earnings_calendar.py
        continue-on-error: true

      - name: Refresh recent model launches (RSS launch detector)
        # Re-fetches the trade-media RSS feeds (RushLane, ET Auto, Autocar Pro,
        # EVReporter), filters to articles tagged Product / Launch for tracked
        # listed OEMs, and writes data/launches_snapshot.json. 30-day rolling
        # window. Idempotent — only rewrites the file when the article set
        # actually changes.
        run: python -u scripts/refresh_launches.py
        continue-on-error: true

      - name: Rebuild dashboard with OEM/SIAM/company history
        # The backfills may have added new months, so rebuild so the periodized
        # OEM tables, the SIAM trend chart, and the listed-company spotlight
        # all pick them up.
        run: python -u build_dashboard.py

      - name: Sync investor_dashboard.json into dist/
        run: |
          mkdir -p dist/data
          cp data/investor_dashboard.json dist/data/investor_dashboard.json

      - name: Sync static assets into dist/
        # Cloudflare Pages serves dist/ exclusively (see wrangler.jsonc
        # pages_build_output_dir). Without this step, edits to static/app.js
        # / static/styles.css / index.html stay invisible to users until
        # someone manually copies them. Mirror the source files here so the
        # cron's dashboard rebuild keeps the deployed JS / CSS in lockstep
        # with the repo. dist/ uses a flat layout (no static/ prefix), so
        # we sed the asset paths in index.html on the way in.
        run: |
          set -e
          cp static/app.js dist/app.js
          cp static/styles.css dist/styles.css
          # Strip the "static/" prefix so dist/index.html resolves locally.
          sed 's|static/styles.css|styles.css|g; s|static/app.js|app.js|g' index.html > dist/index.html

      - name: Decide whether to commit
        id: commit_check
        run: |
          # Only the snapshot files are good signals of "real" change.
          # data/investor_dashboard.json always re-renders generated_at, so we
          # can't trust its diff on its own.
          set -e
          # Stage every signal file that exists; missing files are tolerated
          # because Vahan / news refreshes can legitimately produce nothing.
          for path in data/source_snapshot.json data/news_snapshot.json data/oem_history.json data/siam_history.json data/company_unit_history.json data/rbi_credit.json data/macro_indicators.json data/oem_stocks.json data/oem_earnings_calendar.json data/launches_snapshot.json data/vahan_oem_live.json; do
            if [ -f "$path" ]; then
              git add "$path"
            fi
          done
          # Stage every per-month Vahan CSV the Playwright scraper produced.
          # Each file is small (~200 maker-rows × 6 segments) and grows the
          # registration tab's history forward.
          if [ -d data/vahan ]; then
            git add 'data/vahan/*.csv' 2>/dev/null || true
          fi
          if git diff --staged --quiet; then
            echo "No source-data changes detected; skipping commit."
            echo "commit=false" >> "$GITHUB_OUTPUT"
            # Roll back the rebuilt JSONs / synced assets so we don't leave
            # noise behind on the runner working tree.
            git checkout -- data/investor_dashboard.json dist/data/investor_dashboard.json dist/app.js dist/styles.css dist/index.html 2>/dev/null || true
          else
            echo "Source-data changes detected; will commit."
            echo "commit=true" >> "$GITHUB_OUTPUT"
            git add data/investor_dashboard.json dist/data/investor_dashboard.json
            # Pick up any drift in dist/ static assets too so the deployed
            # JS / CSS / HTML stays in lockstep with static/ + index.html.
            git add dist/app.js dist/styles.css dist/index.html
          fi

      - name: Commit and push
        if: steps.commit_check.outputs.commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): scheduled dashboard refresh

          Triggered by ${{ github.event_name }} on $(date -u +%Y-%m-%dT%H:%MZ)."
          git push
