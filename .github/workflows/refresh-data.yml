name: Refresh dashboard data

on:
  schedule:
    # Three times a day at 8:30 AM, 2:30 PM and 8:30 PM IST.
    # IST = UTC + 05:30, so subtract 05:30: 03:00, 09:00, 15:00 UTC.
    - cron: '0 3,9,15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf openpyxl requests

      - name: Refresh dashboard data
        run: python -u build_dashboard.py --refresh-live

      - name: Backfill PV OEM history
        # Idempotent — only fetches PDFs for months not already in
        # data/pv_oem_history.json. After the first successful run this is
        # essentially a no-op until a new monthly URL appears in
        # data/source_snapshot.json.
        run: python -u scripts/backfill_pv_oem_history.py
        continue-on-error: true

      - name: Rebuild dashboard with PV history
        # The backfill may have added new months, so rebuild so the
        # periodized PV table picks them up.
        run: python -u build_dashboard.py

      - name: Sync investor_dashboard.json into dist/
        run: |
          mkdir -p dist/data
          cp data/investor_dashboard.json dist/data/investor_dashboard.json

      - name: Decide whether to commit
        id: commit_check
        run: |
          # Only the snapshot files are good signals of "real" change.
          # data/investor_dashboard.json always re-renders generated_at, so we
          # can't trust its diff on its own.
          set -e
          git add data/source_snapshot.json data/news_snapshot.json data/pv_oem_history.json
          if git diff --staged --quiet; then
            echo "No source-data changes detected; skipping commit."
            echo "commit=false" >> "$GITHUB_OUTPUT"
            # Roll back the rebuilt JSONs so we don't leave noise behind.
            git checkout -- data/investor_dashboard.json dist/data/investor_dashboard.json 2>/dev/null || true
          else
            echo "Source-data changes detected; will commit."
            echo "commit=true" >> "$GITHUB_OUTPUT"
            git add data/investor_dashboard.json dist/data/investor_dashboard.json
          fi

      - name: Commit and push
        if: steps.commit_check.outputs.commit == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): scheduled dashboard refresh

          Triggered by ${{ github.event_name }} on $(date -u +%Y-%m-%dT%H:%MZ)."
          git push
